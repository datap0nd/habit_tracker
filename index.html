<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Your Life</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23c9a96e'/><polyline points='30,52 45,67 72,37' fill='none' stroke='%230a0a0a' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<script>if(localStorage.getItem('cyl-theme')==='light')document.documentElement.classList.add('light');</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [x-cloak] { display: none !important; }

  :root {
    --bg: #0a0a0a;
    --text: #d4d4d4;
    --text-dim: #3a3a3a;
    --text-secondary: #5a5a5a;
    --accent: #c9a96e;
    --accent-soft: rgba(201,169,110,0.08);
    --border: #1e1e1e;
    --btn-bg: transparent;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --bad: #8b4444;
    --stat-border: #222;
  }

  html.light {
    --bg: #fafaf8;
    --text: #2a2a2a;
    --text-dim: #d0d0cc;
    --text-secondary: #a0a0a0;
    --accent: #b8943e;
    --accent-soft: rgba(184,148,62,0.07);
    --border: #e8e8e4;
    --btn-bg: transparent;
    --bad: #8b4444;
    --stat-border: #e0e0dc;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s, color 0.4s;
  }

  .container {
    max-width: 440px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    position: relative;
  }

  .theme-toggle {
    position: absolute;
    top: 36px;
    right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.7rem;
    color: var(--text-secondary);
    transition: color var(--transition);
    padding: 4px;
    line-height: 1;
    letter-spacing: 0.5px;
    font-weight: 400;
    text-transform: uppercase;
  }
  .theme-toggle:hover { color: var(--accent); }

  /* Greeting area */
  .greeting {
    padding: 48px 0 12px;
  }
  .greeting-text {
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.35;
  }
  .greeting-sub {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 6px;
    letter-spacing: 0.1px;
  }

  /* Ring */
  .ring-wrap {
    display: flex;
    justify-content: center;
    padding: 32px 0 36px;
  }
  .ring-svg {
    width: 100px;
    height: 100px;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 263.89;
    stroke-dashoffset: 263.89;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Question flow */
  .question {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .question:last-child { border-bottom: none; }
  .question.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .question.answered {
    opacity: 0.35;
    transition: opacity 0.6s ease;
  }
  .question.answered.yes {
    opacity: 0.55;
  }

  .q-text {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.45;
    transition: color var(--transition);
  }
  .question.answered.yes .q-text {
    color: var(--accent);
  }
  .question.answered.no .q-text {
    color: var(--text-secondary);
  }

  .q-buttons {
    display: flex;
    gap: 10px;
  }
  .q-btn {
    flex: 1;
    padding: 10px 0;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    background: var(--btn-bg);
    color: var(--text-secondary);
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all var(--transition);
    text-transform: lowercase;
  }
  .q-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .q-btn.selected-yes {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .q-btn.selected-no {
    border-color: var(--text-secondary);
    color: var(--text-secondary);
  }

  /* Closing message */
  .closing {
    padding: 32px 0 0;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
  }
  .closing.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .closing-text {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .closing-text span {
    color: var(--accent);
  }

  /* Bedtime override */
  .bedtime {
    padding: 48px 0;
    text-align: center;
  }
  .bedtime-text {
    font-size: 1.3rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.4;
  }
  .bedtime-sub {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  .site-footer {
    text-align: center;
    padding-top: 48px;
    color: var(--text-secondary);
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* Sheet overlay */
  body.sheet-open { overflow: hidden; }
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 88vh;
    background: var(--bg);
    border-top: 1px solid var(--stat-border);
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-inner {
    max-width: 440px;
    margin: 0 auto;
    padding: 20px 24px 48px;
  }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--stat-border);
    border-radius: 2px;
    margin: 0 auto 28px;
  }

  /* Stats: score */
  .stat-score { text-align: center; padding: 0 0 28px; }
  .stat-score-num {
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .stat-score-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-secondary);
    margin-top: 6px;
  }
  .stat-score-verdict {
    font-size: 0.88rem;
    font-weight: 400;
    margin-top: 16px;
    line-height: 1.55;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Stats: blocks */
  .stat-block {
    padding: 20px 0;
    border-top: 1px solid var(--stat-border);
  }
  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .stat-text {
    font-size: 0.88rem;
    font-weight: 400;
    line-height: 1.55;
  }
  .stat-good { color: var(--accent); }
  .stat-bad { color: var(--bad); }

  /* Stats: life cost */
  .life-cost {
    padding: 24px 0 16px;
    border-top: 1px solid var(--stat-border);
  }
  .life-cost-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }
  .life-cost-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .life-cost-row .val { font-weight: 500; }
  .life-cost-net {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0 4px;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--text);
    border-top: 1px solid var(--stat-border);
    margin-top: 10px;
  }
  .life-cost-disclaimer {
    font-size: 0.68rem;
    color: var(--text-secondary);
    margin-top: 20px;
    line-height: 1.55;
    opacity: 0.7;
  }

  /* "Your truth" link */
  .truth-link { text-align: center; padding: 28px 0 0; }
  .truth-link button {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 0.78rem;
    font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.3px;
    padding: 8px 16px;
    transition: color var(--transition);
  }
  .truth-link button:hover { color: var(--accent); }

  /* No data */
  .no-data { text-align: center; padding: 32px 0; }
  .no-data-title { color: var(--text-secondary); font-size: 0.9rem; font-weight: 400; }
  .no-data-sub { color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px; font-weight: 400; }

  @media (max-width: 480px) {
    .container { padding: 24px 20px 56px; }
    .greeting { padding: 36px 0 8px; }
    .greeting-text { font-size: 1.3rem; }
    .ring-svg { width: 88px; height: 88px; }
  }
</style>
</head>
<body x-data="app()" x-effect="document.documentElement.classList.toggle('light', light)">

<div class="container">
  <button class="theme-toggle" @click="toggleTheme()" aria-label="Toggle theme" x-text="light ? 'dark' : 'light'"></button>

  <!-- Bedtime override -->
  <template x-if="isBedtime">
    <div>
      <div class="bedtime">
        <div class="bedtime-text">Go to sleep.</div>
        <div class="bedtime-sub">Tomorrow's a new day. Rest now.</div>
      </div>
      <div class="truth-link">
        <button @click="openStats()">your truth</button>
      </div>
      <footer class="site-footer">Built with discipline.</footer>
    </div>
  </template>

  <!-- Normal flow -->
  <template x-if="!isBedtime">
    <div>
      <div class="greeting">
        <div class="greeting-text" x-text="greeting"></div>
        <div class="greeting-sub" x-text="greetingSub"></div>
      </div>

      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 96 96">
          <circle class="ring-track" cx="48" cy="48" r="42"/>
          <circle class="ring-progress" cx="48" cy="48" r="42"
                  :style="'stroke-dashoffset:' + (263.89 * (1 - answeredCount / questions.length))"/>
        </svg>
      </div>

      <div>
        <template x-for="(q, index) in questions" :key="q.id">
          <div class="question"
               :class="{
                 visible: index <= currentIndex,
                 answered: answers[q.id] !== undefined,
                 yes: answers[q.id] === true,
                 no: answers[q.id] === false
               }"
               x-init="$watch('currentIndex', v => { if (v >= index) setTimeout(() => $el.classList.add('visible'), 0) })">
            <div class="q-text" x-text="q.text"></div>
            <div class="q-buttons" x-show="answers[q.id] === undefined && index === currentIndex">
              <button class="q-btn" @click="answer(q.id, true)">yes</button>
              <button class="q-btn" @click="answer(q.id, false)">no</button>
            </div>
            <div class="q-buttons" x-show="answers[q.id] !== undefined" x-cloak>
              <button class="q-btn" :class="{ 'selected-yes': answers[q.id] === true }" disabled x-show="answers[q.id] === true">yes</button>
              <button class="q-btn" :class="{ 'selected-no': answers[q.id] === false }" disabled x-show="answers[q.id] === false">no</button>
            </div>
          </div>
        </template>
      </div>

      <div class="closing" :class="{ visible: allAnswered }">
        <div class="closing-text" x-html="closingMessage"></div>
      </div>

      <div class="truth-link">
        <button @click="openStats()">your truth</button>
      </div>

      <footer class="site-footer">Built with discipline.</footer>
    </div>
  </template>
</div>

<!-- Stats bottom sheet -->
<div class="sheet-backdrop" :class="{ open: statsOpen }" @click="closeStats()"></div>
<div class="sheet" :class="{ open: statsOpen }" x-effect="document.body.classList.toggle('sheet-open', statsOpen)">
  <div class="sheet-inner">
    <div class="sheet-handle"></div>

    <template x-if="statsOpen && !statsData">
      <div class="no-data">
        <div class="no-data-title">No data yet.</div>
        <div class="no-data-sub">Come back after your first check-in.</div>
      </div>
    </template>

    <template x-if="statsOpen && statsData">
      <div>
        <div class="stat-score">
          <div class="stat-score-num" :class="statsData.score >= 50 ? 'stat-good' : 'stat-bad'" x-text="Math.round(statsData.score) + '%'"></div>
          <div class="stat-score-label">honesty score</div>
          <div class="stat-score-verdict" x-text="statsData.verdict"></div>
        </div>

        <div class="stat-block">
          <div class="stat-label">sleep</div>
          <div class="stat-text">
            You woke up on time <span :class="statsData.sleep.pct >= 60 ? 'stat-good' : 'stat-bad'" x-text="Math.round(statsData.sleep.pct) + '%'"></span> of the time.
            <span x-text="statsData.sleep.msg"></span>
          </div>
        </div>

        <div class="stat-block">
          <div class="stat-label">exercise</div>
          <div class="stat-text">
            You moved your body <span :class="statsData.exercise.pct >= 50 ? 'stat-good' : 'stat-bad'" x-text="Math.round(statsData.exercise.pct) + '%'"></span> of days.
            <span x-text="statsData.exercise.msg"></span>
          </div>
        </div>

        <div class="stat-block">
          <div class="stat-label">water</div>
          <div class="stat-text">
            You drank enough water <span :class="statsData.water.pct >= 60 ? 'stat-good' : 'stat-bad'" x-text="Math.round(statsData.water.pct) + '%'"></span> of the time.
            <span x-text="statsData.water.msg"></span>
          </div>
        </div>

        <div class="life-cost">
          <div class="life-cost-title">life cost calculator</div>
          <div class="life-cost-row">
            <span>estimated healthy time lost</span>
            <span class="val stat-bad" x-text="statsData.lifeCost.lost"></span>
          </div>
          <div class="life-cost-row">
            <span>estimated healthy time gained</span>
            <span class="val stat-good" x-text="statsData.lifeCost.gained"></span>
          </div>
          <div class="life-cost-net">
            <span>net</span>
            <span :class="statsData.lifeCost.netMin >= 0 ? 'stat-good' : 'stat-bad'" x-text="statsData.lifeCost.net"></span>
          </div>
          <div class="life-cost-disclaimer">Estimates based on aggregate health research. Individual results vary. Not medical advice.</div>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function app() {
  return {
    light: false,
    currentDate: '',
    data: {},
    currentIndex: 0,
    answers: {},
    statsOpen: false,
    statsData: null,

    questions: [],

    get isBedtime() {
      const h = new Date().getHours();
      return h >= 0 && h < 5;
    },

    get timeOfDay() {
      const h = new Date().getHours();
      if (h >= 5 && h < 12) return 'morning';
      if (h >= 12 && h < 17) return 'afternoon';
      if (h >= 17 && h < 21) return 'evening';
      return 'night';
    },

    get greeting() {
      const greetings = {
        morning: 'Good morning.',
        afternoon: 'Good afternoon.',
        evening: 'Good evening.',
        night: 'Still up?',
      };
      return greetings[this.timeOfDay];
    },

    get greetingSub() {
      const subs = {
        morning: "Let's start the day right.",
        afternoon: 'Quick check-in.',
        evening: "Let's see how today went.",
        night: "A few things before you rest.",
      };
      return subs[this.timeOfDay];
    },

    get answeredCount() {
      return Object.keys(this.answers).filter(k => this.answers[k] !== undefined).length;
    },

    get allAnswered() {
      return this.answeredCount === this.questions.length;
    },

    get closingMessage() {
      const yes = Object.values(this.answers).filter(v => v === true).length;
      const total = this.questions.length;
      if (yes === total) return "Clean sweep. <span>Well done.</span>";
      if (yes >= total * 0.75) return "Solid day. <span>Keep going.</span>";
      if (yes >= total * 0.5) return "Some good choices in there. <span>That counts.</span>";
      if (yes > 0) return "You showed up. <span>That matters.</span>";
      return "Tomorrow. <span>Fresh start.</span>";
    },

    init() {
      this.currentDate = this.todayStr();
      try { this.data = JSON.parse(localStorage.getItem('habit-tracker-data')) || {}; } catch { this.data = {}; }
      this.light = localStorage.getItem('cyl-theme') === 'light';
      this.questions = this.getQuestions();

      // Restore answers if already checked in today
      if (this.data[this.currentDate]) {
        this.answers = JSON.parse(JSON.stringify(this.data[this.currentDate]));
        const answeredKeys = Object.keys(this.answers);
        const lastAnswered = this.questions.findIndex(q => !answeredKeys.includes(q.id));
        this.currentIndex = lastAnswered === -1 ? this.questions.length - 1 : lastAnswered;
      } else {
        this.answers = {};
        this.currentIndex = 0;
      }
    },

    getQuestions() {
      const t = this.timeOfDay;

      const morning = [
        { id: 'wokeOnTime', text: 'Did you wake up on time today?' },
        { id: 'madeBed', text: 'Did you make your bed?' },
        { id: 'hygiene', text: 'Shower, teeth, skincare — done?' },
        { id: 'breakfast', text: 'Did you eat a proper breakfast?' },
        { id: 'water', text: 'Have you had water yet?' },
        { id: 'plan', text: 'Do you know what you need to do today?' },
      ];

      const afternoon = [
        { id: 'water', text: 'Are you staying hydrated?' },
        { id: 'meal', text: 'Have you eaten something real today?' },
        { id: 'moved', text: 'Have you moved your body at all?' },
        { id: 'focused', text: 'Did you get focused work done?' },
        { id: 'screens', text: 'Have you taken a break from screens?' },
        { id: 'outside', text: 'Have you been outside today?' },
      ];

      const evening = [
        { id: 'exercise', text: 'Did you exercise today?' },
        { id: 'mealEvening', text: 'Did you eat well today? No junk?' },
        { id: 'water', text: 'Did you drink enough water?' },
        { id: 'read', text: 'Did you read anything today?' },
        { id: 'mindful', text: 'Did you take a quiet moment for yourself?' },
        { id: 'journal', text: 'Have you reflected on the day?' },
        { id: 'tidied', text: 'Is your space in order?' },
        { id: 'prepared', text: 'Are you set up for tomorrow?' },
      ];

      const night = [
        { id: 'exercise', text: 'Did you move your body today?' },
        { id: 'mealNight', text: 'Did you eat well today?' },
        { id: 'water', text: 'Did you drink enough water?' },
        { id: 'read', text: 'Did you read at all today?' },
        { id: 'mindful', text: 'Did you have a quiet moment today?' },
        { id: 'prepared', text: 'Ready for tomorrow?' },
      ];

      const sets = { morning, afternoon, evening, night };
      return sets[t] || evening;
    },

    answer(id, value) {
      this.answers[id] = value;

      // Persist
      if (!this.data[this.currentDate]) this.data[this.currentDate] = {};
      this.data[this.currentDate][id] = value;
      localStorage.setItem('habit-tracker-data', JSON.stringify(this.data));

      // Advance to next unanswered question
      if (!this.allAnswered) {
        setTimeout(() => {
          const next = this.questions.findIndex(q => this.answers[q.id] === undefined);
          if (next !== -1) this.currentIndex = next;
        }, 300);
      }
    },

    todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    },

    toggleTheme() {
      this.light = !this.light;
      localStorage.setItem('cyl-theme', this.light ? 'light' : 'dark');
    },

    openStats() {
      this.statsData = this.computeStats();
      this.statsOpen = true;
    },

    closeStats() {
      this.statsOpen = false;
    },

    computeStats() {
      const sleepIds = ['wokeOnTime'];
      const exerciseIds = ['exercise', 'moved'];
      const waterIds = ['water'];

      let sleepYes = 0, sleepTotal = 0;
      let exYes = 0, exTotal = 0;
      let waterYes = 0, waterTotal = 0;
      let totalYes = 0, totalAnswered = 0;
      let daysTracked = 0;

      const dates = Object.keys(this.data);
      if (dates.length === 0) return null;

      for (const date of dates) {
        const day = this.data[date];
        if (!day || typeof day !== 'object') continue;
        daysTracked++;
        for (const [key, val] of Object.entries(day)) {
          if (val === true || val === false) {
            totalAnswered++;
            if (val) totalYes++;
          }
          if (sleepIds.includes(key)) {
            sleepTotal++;
            if (val === true) sleepYes++;
          }
          if (exerciseIds.includes(key)) {
            exTotal++;
            if (val === true) exYes++;
          }
          if (waterIds.includes(key)) {
            waterTotal++;
            if (val === true) waterYes++;
          }
        }
      }

      if (totalAnswered === 0) return null;

      const pct = (y, t) => t > 0 ? (y / t) * 100 : 0;
      const sleepPct = pct(sleepYes, sleepTotal);
      const exPct = pct(exYes, exTotal);
      const waterPct = pct(waterYes, waterTotal);
      const score = (totalYes / totalAnswered) * 100;

      // Verdicts
      let verdict;
      if (score >= 90) verdict = "You're not just tracking habits. You're living them. Respect.";
      else if (score >= 70) verdict = "You show up most days. That puts you ahead of almost everyone.";
      else if (score >= 50) verdict = "Half the battle is honesty. You're fighting, but there's work to do.";
      else if (score >= 30) verdict = "The data doesn't lie. You know what needs to change.";
      else verdict = "This is your wake-up call. The numbers are brutal, but you opened this page. That's step one.";

      // Category messages
      const sleepMsg = sleepPct >= 80 ? "Your sleep discipline is strong."
        : sleepPct >= 50 ? "Inconsistent. Research shows erratic wake times fragment sleep quality."
        : "You're losing ~16 minutes of healthy life per bad night. This adds up fast.";

      const exMsg = exPct >= 70 ? "Consistent movement. This is adding years."
        : exPct >= 40 ? "Some days on, some off. The CDC says 150 min/week is the minimum."
        : "Sedentary days cost you ~30 minutes of healthy life each. The research is clear.";

      const waterMsg = waterPct >= 70 ? "Good hydration habits."
        : waterPct >= 40 ? "Spotty. Chronic mild dehydration affects cognition and energy."
        : "Consistently under-hydrated. Your body is running on fumes.";

      // Life cost (estimated minutes per tracked day)
      const sleepBadDays = sleepTotal - sleepYes;
      const exBadDays = exTotal - exYes;
      const waterBadDays = waterTotal - waterYes;

      const lostMin = (sleepBadDays * 16) + (exBadDays * 30) + (waterBadDays * 10);
      const gainedMin = (sleepYes * 8) + (exYes * 30) + (waterYes * 5);
      const netMin = gainedMin - lostMin;

      const fmtTime = (mins) => {
        const absM = Math.abs(mins);
        if (absM < 60) return absM + ' min';
        const h = Math.floor(absM / 60);
        const m = absM % 60;
        return m > 0 ? h + 'h ' + m + 'min' : h + 'h';
      };

      return {
        score,
        verdict,
        daysTracked,
        sleep: { pct: sleepPct, msg: sleepMsg },
        exercise: { pct: exPct, msg: exMsg },
        water: { pct: waterPct, msg: waterMsg },
        lifeCost: {
          lost: '-' + fmtTime(lostMin),
          gained: '+' + fmtTime(gainedMin),
          net: (netMin >= 0 ? '+' : '-') + fmtTime(Math.abs(netMin)),
          netMin,
        },
      };
    },
  };
}
</script>
