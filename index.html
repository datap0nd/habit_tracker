<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Your Life</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23c9a96e'/><polyline points='30,52 45,67 72,37' fill='none' stroke='%230a0a0a' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<script>if(localStorage.getItem('cyl-theme')==='light')document.documentElement.classList.add('light');</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [x-cloak] { display: none !important; }

  :root {
    --bg: #0a0a0a;
    --text: #d4d4d4;
    --text-secondary: #5a5a5a;
    --accent: #c9a96e;
    --accent-soft: rgba(201,169,110,0.08);
    --border: #1e1e1e;
    --check-stroke: #0a0a0a;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html.light {
    --bg: #fafaf8;
    --text: #2a2a2a;
    --text-secondary: #a0a0a0;
    --accent: #b8943e;
    --accent-soft: rgba(184,148,62,0.07);
    --border: #e8e8e4;
    --check-stroke: #fafaf8;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s, color 0.4s;
  }

  .container {
    max-width: 440px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    position: relative;
  }

  .theme-toggle {
    position: absolute;
    top: 36px;
    right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--text-secondary);
    transition: color var(--transition);
    padding: 4px;
    line-height: 1;
    letter-spacing: 0.5px;
    font-weight: 400;
    text-transform: uppercase;
  }
  .theme-toggle:hover { color: var(--accent); }

  header {
    text-align: center;
    padding: 48px 0 40px;
  }
  header h1 {
    font-size: 1.75rem;
    font-weight: 300;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 4px;
  }
  header p {
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .ring-wrap {
    display: flex;
    justify-content: center;
    padding: 8px 0 40px;
  }
  .ring-svg {
    width: 128px;
    height: 128px;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 326.73;
    stroke-dashoffset: 326.73;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .habit {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 15px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    transform: translateY(8px);
  }
  .habit:last-child { border-bottom: none; }
  .habit:active { opacity: 0.7; }
  .habit.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .indicator {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), border-color var(--transition);
  }
  .habit.done .indicator {
    background: var(--accent);
    border-color: var(--accent);
  }
  .indicator svg {
    width: 11px;
    height: 11px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
  }
  .habit.done .indicator svg {
    opacity: 1;
    transform: scale(1);
  }

  .habit-text { flex: 1; min-width: 0; }
  .habit-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    transition: color var(--transition);
    line-height: 1.3;
  }
  .habit.done .habit-name { color: var(--accent); }
  .habit-detail {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.3;
    margin-top: 1px;
  }

  .completion {
    text-align: center;
    padding: 32px 0 0;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .completion.show { opacity: 1; }
  .completion-msg {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.2px;
  }
  .completion-streak {
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .site-footer {
    text-align: center;
    padding-top: 48px;
    color: var(--text-secondary);
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  @media (max-width: 480px) {
    .container { padding: 24px 20px 56px; }
    header { padding: 36px 0 32px; }
    header h1 { font-size: 1.5rem; }
    .ring-svg { width: 110px; height: 110px; }
  }
</style>
</head>
<body x-data="app()" x-effect="document.documentElement.classList.toggle('light', light)">

<div class="container">
  <button class="theme-toggle" @click="toggleTheme()" aria-label="Toggle theme" x-text="light ? 'dark' : 'light'"></button>

  <header>
    <h1>Change Your Life</h1>
    <p>Small daily habits. Extraordinary results.</p>
  </header>

  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 120 120">
      <circle class="ring-track" cx="60" cy="60" r="52"/>
      <circle class="ring-progress" cx="60" cy="60" r="52"
              :style="'stroke-dashoffset:' + (326.73 * (1 - countDone(currentDate) / habits.length))"/>
    </svg>
  </div>

  <div>
    <template x-for="(habit, index) in habits" :key="habit.id">
      <div class="habit"
           :class="{ done: isDone(habit.id) }"
           tabindex="0"
           role="button"
           :aria-pressed="isDone(habit.id) ? 'true' : 'false'"
           @click="toggle(habit)"
           @keydown.enter.prevent="toggle(habit)"
           @keydown.space.prevent="toggle(habit)"
           x-init="setTimeout(() => $el.classList.add('visible'), 60 + index * 50)"
           :style="'transition: opacity 0.4s ease ' + (index * 0.05) + 's, transform 0.4s ease ' + (index * 0.05) + 's'">
        <div class="indicator">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--check-stroke)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="habit-text">
          <div class="habit-name" x-text="habit.name"></div>
          <div class="habit-detail" x-text="habit.detail"></div>
        </div>
      </div>
    </template>
  </div>

  <div class="completion" :class="{ show: isAllDone(currentDate) }">
    <div class="completion-msg">All complete.</div>
    <div class="completion-streak" x-show="streak > 1" x-cloak x-text="streak + ' day streak'"></div>
  </div>

  <footer class="site-footer">Built with discipline.</footer>
</div>

<script>
function app() {
  return {
    habits: [
      { id: 'sleep',    name: 'Sleep 7+ hours',          detail: 'Quality rest for recovery' },
      { id: 'hygiene',  name: 'Morning hygiene routine', detail: 'Shower, brush teeth, skincare' },
      { id: 'workout',  name: 'Workout / Exercise',      detail: '30+ minutes of movement' },
      { id: 'water',    name: 'Drink 8 glasses of water',detail: 'Stay hydrated all day' },
      { id: 'read',     name: 'Read for 20+ minutes',    detail: 'Feed your mind daily' },
      { id: 'meditate', name: 'Meditate / Mindfulness',  detail: '10 minutes of stillness' },
      { id: 'eat',      name: 'Eat a healthy meal',      detail: 'No junk food today' },
      { id: 'journal',  name: 'Journal / Reflect',       detail: 'Write about your day' },
    ],
    currentDate: '',
    data: {},
    light: false,
    bestStreak: 0,

    init() {
      this.currentDate = this.todayStr();
      try { this.data = JSON.parse(localStorage.getItem('habit-tracker-data')) || {}; } catch { this.data = {}; }
      this.light = localStorage.getItem('cyl-theme') === 'light';
      this.bestStreak = parseInt(localStorage.getItem('habit-tracker-best-streak') || '0', 10);
    },

    get streak() {
      let n = 0, d = this.todayStr();
      if (!this.isAllDone(d)) d = this.shiftDate(d, -1);
      while (this.isAllDone(d)) { n++; d = this.shiftDate(d, -1); }
      return n;
    },

    todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    },
    shiftDate(str, days) {
      const [y,m,d] = str.split('-').map(Number);
      const dt = new Date(y, m-1, d);
      dt.setDate(dt.getDate() + days);
      return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    },
    countDone(date) {
      const d = this.data[date] || {};
      return this.habits.filter(h => d[h.id]).length;
    },
    isAllDone(date) { return this.countDone(date) === this.habits.length; },
    isDone(id) { return !!(this.data[this.currentDate] && this.data[this.currentDate][id]); },

    toggle(habit) {
      if (!this.data[this.currentDate]) this.data[this.currentDate] = {};
      this.data[this.currentDate][habit.id] = !this.data[this.currentDate][habit.id];
      localStorage.setItem('habit-tracker-data', JSON.stringify(this.data));
      if (this.streak > this.bestStreak) {
        this.bestStreak = this.streak;
        localStorage.setItem('habit-tracker-best-streak', String(this.bestStreak));
      }
    },
    toggleTheme() {
      this.light = !this.light;
      localStorage.setItem('cyl-theme', this.light ? 'light' : 'dark');
    },
  };
}
</script>
</body>
</html>
